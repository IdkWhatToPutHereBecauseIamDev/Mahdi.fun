<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahdi.Fun</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-dark: #0a0a0a;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 3D Model Section */
        model-viewer {
            width: 100%;
            height: 500px;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }

        .container {
            max-width: 800px;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Unique Project Buttons */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .btn {
            padding: 15px 25px;
            border: 2px solid var(--neon-blue);
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            background: rgba(0, 242, 255, 0.05);
        }

        .btn:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
            transform: translateY(-5px);
        }

        /* Slot Machine Section */
        .slot-machine {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--neon-purple);
            margin-top: 50px;
        }

        #display {
            font-size: 1.5rem;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-family: monospace;
            color: var(--neon-purple);
            border-bottom: 1px solid #333;
        }

        .spin-btn {
            background: var(--neon-purple);
            border: none;
            padding: 10px 30px;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .spin-btn:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="YOUR_MODEL_FILE.glb" 
        alt="A 3D representation of my workspace"
        auto-rotate 
        camera-controls 
        shadow-intensity="1"
        touch-action="pan-y">
    </model-viewer>

    <div class="container">
        <h1>My Projects</h1>
        <p>Explore the repositories I've built on GitHub.</p>

        <div class="project-grid">
            <a href="https://github.com/IdkWhatToPutHereBecauseIamDev/Nuke" class="btn" target="_blank">Project: Nuke</a>
            <a href="https://github.com/IdkWhatToPutHereBecauseIamDev/Blog2" class="btn" target="_blank">Blog 2.0</a>
            <a href="https://github.com/IdkWhatToPutHereBecauseIamDev/Blog" class="btn" target="_blank">Original Blog</a>
        </div>

        <div class="slot-machine">
            <h3>Project Roulette</h3>
            <div id="display">READY?</div>
            <button class="spin-btn" onclick="spinSlot()">SPIN TO VISIT</button>
        </div>
    </div>

    <script>
        const sites = [
            "https://github.com/IdkWhatToPutHereBecauseIamDev/Nuke",
            "https://github.com/IdkWhatToPutHereBecauseIamDev/Blog2",
            "https://github.com/IdkWhatToPutHereBecauseIamDev/Blog"
        ];

        function spinSlot() {
            const display = document.getElementById('display');
            let counter = 0;
            
            // Random spinning effect
            const interval = setInterval(() => {
                const tempSite = sites[Math.floor(Math.random() * sites.length)];
                display.innerText = tempSite.split('/').pop(); // Show just the repo name
                counter++;
                
                if (counter > 15) {
                    clearInterval(interval);
                    const finalSite = sites[Math.floor(Math.random() * sites.length)];
                    display.innerText = "OPENING: " + finalSite.split('/').pop();
                    
                    // Wait a second then redirect
                    setTimeout(() => {
                        window.open(finalSite, '_blank');
                    }, 800);
                }
            }, 100);
        }
    </script>
</body>
</html>
